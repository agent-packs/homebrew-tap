name: Sync agent-packs formula

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - agent-packs-release

permissions:
  contents: write

jobs:
  sync:
    name: Sync latest CLI release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v7

      - name: Sync formula
        id: sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/sync-agent-packs-formula.py

      - name: Validate formula syntax
        if: steps.sync.outputs.changed == 'true'
        run: ruby -c Formula/agent-packs.rb

      - name: Commit formula update
        if: steps.sync.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.sync.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-packs.rb
          git commit -m "Update agent-packs to v${VERSION}"
          git push
